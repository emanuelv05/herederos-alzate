<div class="add-output-backdrop" (click)="onClose()">
  <section class="add-output-card" (click)="$event.stopPropagation()">
    <header class="card-header">
      <div class="card-title">
        <span class="icon-badge icon-badge-danger">
          <lucide-icon [img]="Minus" class="title-icon title-icon-danger"></lucide-icon>
        </span>
        <div><h3>Registrar Salida</h3></div>
      </div>
      <button class="icon-btn" type="button" (click)="onClose()">
        <lucide-icon [img]="X" class="close-icon"></lucide-icon>
      </button>
    </header>

    <div class="divider divider-danger"></div>

    <div class="form-grid">
      <label class="field">
        <span>Calzado</span>
        <select [(ngModel)]="form.id_variante">
          <option [ngValue]="null" disabled>Selecciona un calzado</option>
          <option *ngFor="let c of calzados" [ngValue]="c.id_variante">
            {{ c.nombre }}
          </option>
        </select>
      </label>

      <label class="field">
        <span>Cantidad</span>
        <input type="number" min="1" placeholder="0" [(ngModel)]="form.cantidad">
      </label>

      <label class="field">
        <span>Fecha de movimiento</span>
        <input type="date" [(ngModel)]="form.fecha_movimiento">
      </label>

      <label class="field full">
        <span>Observaciones</span>
        <textarea rows="4" placeholder="Detalle adicional de la salida" [(ngModel)]="form.descripcion"></textarea>
      </label>
    </div>

    <footer class="form-actions">
      <button class="btn btn-ghost" type="button" (click)="onClose()">Cancelar</button>
      <button class="btn btn-danger" type="button" (click)="guardar()">Guardar</button>
    </footer>
  </section>
</div>
