<div class="recovery-page">
	<div class="left-panel">
		<div class="left-overlay"></div>

		<div class="left-content">
			<div class="logo-badge">
				<img src="/img/IconoHerederosAlzateLargo.jpg" alt="Herederos Alzate" class="company-logo" />
			</div>

			<p class="company-text">
				Herederos Alzate: tradición e innovación para un estilo único.
			</p>
		</div>
	</div>

	<div class="right-panel">
		<div class="reset-card">
			<h1>Resetear Contraseña</h1>
			<p class="subtitle">Ingresa y confirma tu nueva contraseña</p>
			<p class="user" *ngIf="usuario">Usuario: <strong>{{ usuario }}</strong></p>

			<form [formGroup]="resetForm" (ngSubmit)="resetPassword()">
				<div class="input-wrapper">
					<lucide-icon class="input-icon" [img]="Lock"></lucide-icon>

					<input
						[type]="passwordInputType()"
						formControlName="password"
						placeholder="Nueva contraseña"
					/>

					<button type="button" class="eye-btn" (click)="togglePasswordVisibility()">
						<lucide-icon [img]="showPassword ? EyeOff : Eye" class="eye-icon"></lucide-icon>
					</button>
				</div>

				<p class="error" *ngIf="resetForm.get('password')?.invalid && resetForm.get('password')?.touched">
					Ingresa una contraseña de mínimo 6 caracteres.
				</p>

				<div class="input-wrapper second-input">
					<lucide-icon class="input-icon" [img]="Lock"></lucide-icon>

					<input
						[type]="confirmPasswordInputType()"
						formControlName="confirmPassword"
						placeholder="Confirmar contraseña"
					/>

					<button type="button" class="eye-btn" (click)="toggleConfirmPasswordVisibility()">
						<lucide-icon [img]="showConfirmPassword ? EyeOff : Eye" class="eye-icon"></lucide-icon>
					</button>
				</div>

				<p class="error" *ngIf="resetForm.get('confirmPassword')?.invalid && resetForm.get('confirmPassword')?.touched">
					Confirma tu contraseña (mínimo 6 caracteres).
				</p>

				<p class="error" *ngIf="resetForm.hasError('passwordMismatch') && resetForm.get('confirmPassword')?.touched">
					Las contraseñas no coinciden.
				</p>

				<div class="actions">
					<button type="button" class="btn-back" (click)="volverCodigo()">Volver</button>
					<button type="submit" class="btn-reset">Restablecer</button>
				</div>
			</form>

			<p class="feedback" [class.error]="feedbackType === 'error'" *ngIf="feedback">{{ feedback }}</p>
		</div>
	</div>
</div>
